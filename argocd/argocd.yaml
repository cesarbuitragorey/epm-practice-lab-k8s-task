apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: epam-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/cesarbuitragorey/epm-practice-lab-k8s-task
    targetRevision: main
    path: .   

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated: {}